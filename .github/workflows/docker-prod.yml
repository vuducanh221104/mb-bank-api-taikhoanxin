name: Docker CI/CD Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  IMAGE_NAME: taikhoanxin/tkx-mb-bank-api
  APP_DIR: /opt/mb-bank-api
  HOST_PORT: 5001

jobs:
  build-and-push:
    name: Build and push Docker image
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      image: ${{ steps.meta.outputs.image }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Prepare image metadata
        id: meta
        run: |
          IMAGE="${IMAGE_NAME}:latest"
          SHA_IMAGE="${IMAGE_NAME}:${GITHUB_SHA}"
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"
          echo "sha_image=${SHA_IMAGE}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}
            ${{ steps.meta.outputs.sha_image }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare app directory on server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          port: ${{ secrets.PROD_SSH_PORT || 22 }}
          script: |
            mkdir -p "${{ env.APP_DIR }}"

      - name: Copy docker compose file to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          port: ${{ secrets.PROD_SSH_PORT || 22 }}
          source: "docker-compose.prod.yml"
          target: "${{ env.APP_DIR }}"

      - name: Deploy container on server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          port: ${{ secrets.PROD_SSH_PORT || 22 }}
          script: |
            set -e
            mkdir -p "${{ env.APP_DIR }}"
            cd "${{ env.APP_DIR }}"

            if [ ! -f /opt/TaiKhoanXin/Production/env/mbbankapi.env ]; then
              echo "Missing production env file: /opt/TaiKhoanXin/Production/env/mbbankapi.env"
              echo "Create it as a file, not a directory."
              exit 1
            fi

            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
            MB_BANK_API_IMAGE="${{ needs.build-and-push.outputs.image }}" docker compose -f docker-compose.prod.yml pull
            MB_BANK_API_IMAGE="${{ needs.build-and-push.outputs.image }}" docker compose -f docker-compose.prod.yml up -d
            docker image prune -f
